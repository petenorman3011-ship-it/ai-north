  <rect width="800" height="1200" fill="url(#hexPattern)"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- MAIN CARD                                         -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect x="40" y="40" width="720" height="1120" rx="18" ry="18" fill="url(#cardGrad)" opacity="0.97"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- TOP HEADER BAND                                   -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect x="40" y="40" width="720" height="140" rx="18" ry="18" fill="url(#headerGrad)"/>
  <rect x="40" y="140" width="720" height="40" fill="url(#headerGrad)"/>

  <!-- DNA Helix Icon -->
  <!-- Spine left -->
  <line x1="72" y1="58" x2="72" y2="162" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spine right -->
  <line x1="96" y1="58" x2="96" y2="162" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rungs -->
  <line x1="72" y1="68"  x2="96" y2="75"  stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="82"  x2="96" y2="89"  stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="96"  x2="96" y2="103" stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="110" x2="96" y2="117" stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="124" x2="96" y2="131" stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="138" x2="96" y2="145" stroke="#7ec8ff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Node dots -->
  <circle cx="72" cy="68"  r="3.5" fill="#4a9eff"/>
  <circle cx="96" cy="75"  r="3.5" fill="#4a9eff"/>
  <circle cx="72" cy="96"  r="3.5" fill="#4a9eff"/>
  <circle cx="96" cy="103" r="3.5" fill="#4a9eff"/>
  <circle cx="72" cy="124" r="3.5" fill="#4a9eff"/>
  <circle cx="96" cy="131" r="3.5" fill="#4a9eff"/>

  <!-- Brand Name -->
  <text x="118" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#a8c4e0" letter-spacing="4" text-anchor="start">ADVANCED PEPTIDES UK</text>
  <line x1="118" y1="106" x2="440" y2="106" stroke="#4a9eff" stroke-width="0.8" opacity="0.6"/>
  <text x="118" y="125" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#7090b0" letter-spacing="2.5" text-anchor="start">ADVANCED PEPTIDE THERAPY</text>
  <text x="118" y="142" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#7090b0" letter-spacing="2.5" text-anchor="start">ENGINEERED FOR PRECISION</text>

