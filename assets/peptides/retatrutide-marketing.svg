  <!-- ══════════════════════════════════════════════════ -->
  <text x="400" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" fill="#0d1f3c" letter-spacing="3" text-anchor="middle">RETATRUTIDE</text>
  <text x="400" y="270" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4a6fa5" letter-spacing="5" text-anchor="middle">PRE-FILLED INJECTION PEN</text>
  <line x1="120" y1="285" x2="680" y2="285" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- FEATURE BULLETS                                   -->
  <!-- ══════════════════════════════════════════════════ -->
  <!-- Bullet 1 -->
  <circle cx="105" cy="320" r="5" fill="#4a9eff"/>
  <text x="122" y="325" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1b2a4a" font-weight="600">Advanced peptide therapy</text>
