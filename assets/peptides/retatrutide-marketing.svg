<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- Background hex pattern -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 58,17 58,47 30,62 2,47 2,17" fill="none" stroke="#2a3f6e" stroke-width="0.8" opacity="0.3"/>
    </pattern>
    <!-- Holographic gradient for seal -->
    <radialGradient id="holoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e0f7fa"/>
      <stop offset="20%"  stop-color="#b2ebf2"/>
      <stop offset="40%"  stop-color="#c5e1a5"/>
      <stop offset="60%"  stop-color="#f8bbd0"/>
      <stop offset="80%"  stop-color="#d1c4e9"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <!-- Top header gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1b3a6b"/>
    </linearGradient>
    <!-- Bottom banner gradient -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1b3a6b"/>
    </linearGradient>
    <!-- DNA helix gradient -->
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#1b5fc0"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════════════ -->
