    <rect x="184" y="222" width="52" height="52" rx="3" fill="#f0f4f8"/>
    <rect x="188" y="226" width="14" height="14" rx="1" fill="#0d1f3c"/>
    <rect x="218" y="226" width="14" height="14" rx="1" fill="#0d1f3c"/>
    <rect x="188" y="256" width="14" height="14" rx="1" fill="#0d1f3c"/>
    <rect x="207" y="242" width="5"  height="5"  fill="#0d1f3c"/>
    <rect x="215" y="250" width="5"  height="5"  fill="#0d1f3c"/>
    <rect x="207" y="257" width="5"  height="5"  fill="#0d1f3c"/>
